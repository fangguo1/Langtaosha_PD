<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scholar Search</title>
  <style>
    :root {
      --bg: #f4f4f2;
      --card: #ffffff;
      --text: #181818;
      --muted: #555555;
      --primary: #c8b15a;
      --primary-dark: #a48f3f;
      --border: #d8d8d4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #f6f6f4 0%, #f1f1ee 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px 56px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 8px 26px rgba(15, 23, 42, 0.06);
    }

    .search-box input {
      flex: 1;
      border: 0;
      outline: none;
      font-size: 16px;
      padding: 10px 12px;
      background: transparent;
    }

    .search-box button {
      border: 0;
      border-radius: 10px;
      background: var(--primary);
      color: #1c1c1c;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
    }

    .search-box button:hover {
      background: var(--primary-dark);
    }

    .search-box button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      margin: 14px 4px 10px;
      color: var(--muted);
      font-size: 14px;
      min-height: 22px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      width: 100%;
      gap: 12px;
      margin: 12px 0 10px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .filter-group {
      min-width: 220px;
    }

    .filter-title {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border: 1px solid var(--border);
      background: #f8fafc;
      color: #1e293b;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--primary);
      background: #fff8dc;
      color: #2b2b2b;
      font-weight: 700;
    }

    .results {
      display: grid;
      width: 100%;
      gap: 14px;
      margin-top: 8px;
    }

    .paper {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      overflow-wrap: anywhere;
    }

    .title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      color: #1b1b1b;
      line-height: 1.4;
    }

    .meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .abstract {
      margin: 0;
      line-height: 1.7;
      color: #1e293b;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .meta a {
      overflow-wrap: anywhere;
      word-break: break-all;
    }

    @media (max-width: 640px) {
      .container { padding-top: 20px; }
      h1 { font-size: 24px; }
      .search-box { flex-direction: column; }
      .search-box button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Scholar Search</h1>

    <form id="searchForm" class="search-box">
      <input id="queryInput" type="text" placeholder="输入论文主题，例如: protein folding" required />
      <button id="searchBtn" type="submit">搜索</button>
    </form>

    <div id="status" class="status"></div>

    <div id="filterBar" class="filter-bar" style="display:none;">
      <div class="filter-group">
        <span class="filter-title">Source</span>
        <div id="sourceFilters" class="chips"></div>
      </div>
      <div class="filter-group">
        <span class="filter-title">Year</span>
        <div id="yearFilters" class="chips"></div>
      </div>
    </div>

    <div id="results" class="results"></div>
  </div>

  <script>
    const initialQuery = {{ initial_query|tojson }};
    const form = document.getElementById("searchForm");
    const queryInput = document.getElementById("queryInput");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const filterBarEl = document.getElementById("filterBar");
    const sourceFiltersEl = document.getElementById("sourceFilters");
    const yearFiltersEl = document.getElementById("yearFilters");
    const resultsEl = document.getElementById("results");

    let allResults = [];
    let selectedSource = "all";
    let selectedYear = "all";

    function escapeHtml(value) {
      return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function extractYear(onlineDate) {
      if (!onlineDate) return "Unknown";
      const s = String(onlineDate);
      const m = s.match(/^(\d{4})/);
      return m ? m[1] : "Unknown";
    }

    function makeChip(label, active, onClick) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = active ? "chip active" : "chip";
      btn.textContent = label;
      btn.addEventListener("click", onClick);
      return btn;
    }

    function renderItem(item) {
      const title = escapeHtml(item.title || "(无标题)");
      const abstract = escapeHtml(item.abstract || "(无摘要)");
      const authors = escapeHtml(item.authors || "未知作者");
      const doi = escapeHtml(item.doi || "-");
      const onlineDate = escapeHtml(formatDate(item.online_date));
      const source = escapeHtml(item.source || "-");
      const link = item.link ? escapeHtml(item.link) : "";
      const linkHtml = link
        ? `<a href="${link}" target="_blank" rel="noopener noreferrer">${link}</a>`
        : "-";

      return `
        <article class="paper">
          <h2 class="title">${title}</h2>
          <p class="meta"><strong>Authors:</strong> ${authors}</p>
          <p class="meta"><strong>Source:</strong> ${source}</p>
          <p class="meta"><strong>DOI:</strong> ${doi} | <strong>Online Date:</strong> ${onlineDate}</p>
          <p class="meta"><strong>Link:</strong> ${linkHtml}</p>
          <p class="meta"><strong>ABSTRACT</strong></p>
          <p class="abstract">${abstract}</p>
        </article>
      `;
    }

    function formatDate(value) {
      if (!value) return "-";
      const s = String(value);
      const m = s.match(/^(\\d{4})-(\\d{2})-(\\d{2})/);
      if (!m) return s;
      return `${m[1]}-${m[2]}-${m[3]}`;
    }

    function renderFilters() {
      const sourceCounts = { all: allResults.length, langtaosha: 0, biorxiv: 0 };
      const yearCounts = {};

      allResults.forEach((item) => {
        const sk = item.source_key || "unknown";
        if (sourceCounts[sk] !== undefined) {
          sourceCounts[sk] += 1;
        }
        const y = extractYear(item.online_date);
        yearCounts[y] = (yearCounts[y] || 0) + 1;
      });

      sourceFiltersEl.innerHTML = "";
      sourceFiltersEl.appendChild(
        makeChip(`All (${sourceCounts.all || 0})`, selectedSource === "all", () => {
          selectedSource = "all";
          renderFilters();
          renderFilteredResults();
        })
      );
      sourceFiltersEl.appendChild(
        makeChip(`Langtaosha (${sourceCounts.langtaosha || 0})`, selectedSource === "langtaosha", () => {
          selectedSource = "langtaosha";
          renderFilters();
          renderFilteredResults();
        })
      );
      sourceFiltersEl.appendChild(
        makeChip(`Biorxiv (${sourceCounts.biorxiv || 0})`, selectedSource === "biorxiv", () => {
          selectedSource = "biorxiv";
          renderFilters();
          renderFilteredResults();
        })
      );

      const sortedYears = Object.keys(yearCounts).sort((a, b) => {
        if (a === "Unknown") return 1;
        if (b === "Unknown") return -1;
        return Number(b) - Number(a);
      });

      yearFiltersEl.innerHTML = "";
      yearFiltersEl.appendChild(
        makeChip(`All (${allResults.length})`, selectedYear === "all", () => {
          selectedYear = "all";
          renderFilters();
          renderFilteredResults();
        })
      );
      sortedYears.forEach((year) => {
        yearFiltersEl.appendChild(
          makeChip(`${year} (${yearCounts[year]})`, selectedYear === year, () => {
            selectedYear = year;
            renderFilters();
            renderFilteredResults();
          })
        );
      });
    }

    function getFilteredResults() {
      return allResults.filter((item) => {
        const sourceOk = selectedSource === "all" || item.source_key === selectedSource;
        const year = extractYear(item.online_date);
        const yearOk = selectedYear === "all" || year === selectedYear;
        return sourceOk && yearOk;
      });
    }

    function renderFilteredResults() {
      const filtered = getFilteredResults();
      statusEl.textContent = `Top 100 Results: ${allResults.length} | Filtered: ${filtered.length}`;
      if (!filtered.length) {
        resultsEl.innerHTML = "<div class='paper'>当前筛选条件下暂无结果</div>";
        return;
      }
      resultsEl.innerHTML = filtered.map(renderItem).join("");
    }

    async function searchPapers(query) {
      const url = `/api/scholar/search?query=${encodeURIComponent(query)}&top_k=100`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (!resp.ok || !data.success) {
        throw new Error(data.error || "搜索失败");
      }
      return data;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) {
        statusEl.textContent = "请输入 query";
        return;
      }

      searchBtn.disabled = true;
      statusEl.textContent = "正在搜索...";
      filterBarEl.style.display = "none";
      resultsEl.innerHTML = "";

      try {
        const data = await searchPapers(query);
        allResults = data.results || [];
        selectedSource = "all";
        selectedYear = "all";

        if (!allResults.length) {
          resultsEl.innerHTML = "<div class='paper'>暂无结果</div>";
        } else {
          filterBarEl.style.display = "flex";
          renderFilters();
          renderFilteredResults();
        }
      } catch (err) {
        statusEl.textContent = `错误: ${err.message}`;
      } finally {
        searchBtn.disabled = false;
      }
    });

    if (initialQuery && typeof initialQuery === "string") {
      queryInput.value = initialQuery;
      form.dispatchEvent(new Event("submit"));
    }
  </script>
</body>
</html>
