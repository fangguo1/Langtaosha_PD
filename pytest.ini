[pytest]
# Pytest 配置文件

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
# -v: 显示详细的测试输出
# -s: 禁用 stdout 捕获，实时显示日志
# --log-cli-level: 命令行日志级别
# --log-cli-format: 命令行日志格式
# --tb=short: 简短的 traceback

# 默认日志级别（如果不通过命令行指定）
log_cli_level = INFO
log_cli_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 标记
markers =
    integration: 集成测试（需要真实服务）
    unit: 单元测试（使用 mock）
    slow: 慢速测试
